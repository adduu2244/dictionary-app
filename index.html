<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> My Dictionary</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">

        <div class="search-form">
            <input type="text" id="searchInput" placeholder="Type any word">
            <button id="searchBtn">Search</button>
        </div>

        <div class="card">
            <h2 id="word">Word</h2>
            <p id="synonyms">Synonyms:</p>

            <button id="playAudio">🔊 Play Audio</button>

            <p><strong>Meaning:</strong> <span id="meaning"></span></p>
            <p><strong>Example:</strong> <span id="example"></span></p>
            <p><strong>Part of Speech:</strong> <span id="pos"></span></p>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
